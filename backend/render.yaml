services:
  - type: web
    name: boilerplate-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/server.js
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: 1
      - key: AUTH_COOKIE_SECURE
        value: true
      - key: CORS_ORIGINS
        value: https://EDITE-ME.pages.dev
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: boilerplate-api
      - key: JWT_AUDIENCE
        value: boilerplate-admin
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
