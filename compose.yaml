name: boilerplate-lp

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./backend
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/boilerplate
      CORS_ORIGINS: http://localhost:${APP_PORT:-8080}
      TRUST_PROXY: 1
      JWT_SECRET: ${JWT_SECRET:-docker-local-secret-change-before-production-123456}
      JWT_ISSUER: ${JWT_ISSUER:-boilerplate-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-boilerplate-admin}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
      SESSION_IDLE_TTL_MINUTES: ${SESSION_IDLE_TTL_MINUTES:-60}
      AUTH_COOKIE_SECURE: "false"
      ADMIN_NAME: ${ADMIN_NAME:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-docker-local}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-docker-local}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-docker-local}
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:8.0
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
